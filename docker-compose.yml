services:
  # Запуск всех тестов - используем builder стадию
  tests:
    build:
      context: .
      target: builder
    environment:
      - QT_QPA_PLATFORM=minimal
    command: >
      sh -c "
        cd /build/build &&
        echo '==========================================' &&
        echo 'ЗАПУСК UNIT-ТЕСТОВ' &&
        echo '==========================================' &&
        xvfb-run -a ./test_difficultysettings &&
        xvfb-run -a ./test_mazegenerator &&
        xvfb-run -a ./test_pathfinder &&
        xvfb-run -a ./test_mainwindow &&
        xvfb-run -a ./test_mazewidget &&
        echo '' &&
        echo '==========================================' &&
        echo 'ЗАПУСК СЦЕНАРИЕВ' &&
        echo '==========================================' &&
        ./scenario_full_generation &&
        ./scenario_path_search &&
        ./scenario_difficulty_switch &&
        ./scenario_large_maze &&
        echo '' &&
        echo '==========================================' &&
        echo 'ВСЕ ТЕСТЫ УСПЕШНО ПРОЙДЕНЫ' &&
        echo '=========================================='
      "
    restart: "no"

  # Только unit-тесты
  unit-tests:
    build:
      context: .
      target: builder
    environment:
      - QT_QPA_PLATFORM=minimal
    command: >
      sh -c "
        cd /build/build &&
        xvfb-run -a ./test_difficultysettings &&
        xvfb-run -a ./test_mazegenerator &&
        xvfb-run -a ./test_pathfinder &&
        xvfb-run -a ./test_mainwindow &&
        xvfb-run -a ./test_mazewidget
      "
    restart: "no"

  # GUI приложение - использует финальный образ
  app:
    build:
      context: .
      target: builder
    environment:
      - DISPLAY=${DISPLAY}
      - QT_QPA_PLATFORM=xcb
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${XAUTHORITY:-$HOME/.Xauthority}:/root/.Xauthority:ro
    network_mode: host
    command: ["/build/build/MazeGenerator"]
    stdin_open: true
    tty: true
    restart: "no"